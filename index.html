<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- 视口配置：禁止缩放确保PWA全屏体验，viewport-fit=cover适配iPhone刘海屏 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<!-- PWA主题色：深红色，与App传统风格一致 -->
<meta name="theme-color" content="#8b1a1a">
<!-- iOS Safari 全屏模式支持 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="小六壬">
<link rel="apple-touch-icon" href="icons/LOGO68.png">
<meta name="description" content="小六壬占卜 - 诸葛马前课，中国传统占卜术">
<link rel="manifest" href="manifest.json">
<title>小六壬占卜</title>
<style>
  /*
   * ==================== CSS 自定义属性 (Design Tokens) ====================
   * 配色方案基于中国传统配色体系：
   *   - 宣纸色系（bg/card/card2）模拟古籍纸张
   *   - 朱砂红（red/red2）用于标题、按钮和凶兆
   *   - 古铜金（gold/gold2/gold-light）用于边框、装饰和吉兆
   *   - 水墨黑（text/text2）用于文字层级
   * 所有颜色通过 CSS 变量管理，暗色模式只需覆盖变量值即可
   */
  :root {
    --bg: #f5e6c8;              /* 页面背景 - 仿古宣纸色 */
    --card: #fdf5e6;            /* 卡片背景 - 较亮的纸色（主要卡片） */
    --card2: #faf0dc;           /* 次级卡片背景 - 略深的纸色（嵌套卡片） */
    --text: #2c1810;            /* 主文字色 - 深墨色 */
    --text2: #5c3a28;           /* 次级文字色 - 淡墨色（标签、辅助信息） */
    --red: #b22222;             /* 朱砂红 - 用于强调、按钮渐变起点 */
    --red2: #8b1a1a;            /* 深红 - 用于标题渐变终点、凶兆标识 */
    --gold: #c8a44e;            /* 古铜金 - 用于边框高亮、装饰线 */
    --gold2: #a07830;           /* 深金 - 用于金色文字 */
    --gold-light: #e8d5a3;      /* 浅金 - 用于高亮背景（如当前掌诀位置） */
    --green: #2d6a4f;           /* 翠绿 - 用于吉兆指示（在线状态点） */
    --yin: #e8dcc8;             /* 阴阳底色 - 用于中央太极区域 */
    --border: #d4c5a0;          /* 统一边框色 */
    --shadow: rgba(44,24,16,0.12); /* 统一阴影 - 基于墨色 */
    --radius: 16px;             /* 统一圆角半径 */
    --safe-bottom: env(safe-area-inset-bottom, 16px); /* iPhone刘海屏底部安全区 */
  }

  /*
   * 暗色模式配色
   * 设计原则：
   *   - 降低整体亮度，减少蓝光刺激
   *   - 保持足够的对比度确保可读性
   *   - 红色/金色适当提亮，在暗背景下仍能吸引注意力
   */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1410;
      --card: #231a12;
      --card2: #2a1f16;
      --text: #e8dcc8;
      --text2: #c4b898;
      --red: #d44444;
      --red2: #b22222;
      --gold: #d4b060;
      --gold2: #b89030;
      --gold-light: #5a4828;
      --yin: #2a1f16;
      --border: #3a2a18;
      --shadow: rgba(0,0,0,0.3);
    }
  }

  /* === 全局重置 === */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100%; -webkit-tap-highlight-color: transparent; } /* 移除iOS点击高亮 */
  body {
    font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100%;
    min-height: 100dvh; /* dvh单位：移动端动态视口高度，避免地址栏遮挡 */
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px calc(20px + var(--safe-bottom)); /* 底部额外留白给安全区 */
    -webkit-font-smoothing: antialiased; /* macOS/iOS字体平滑 */
    user-select: none;          /* 禁止文本选择，增强App感 */
    -webkit-user-select: none;
    /*
     * 页面背景纹理：上下两个径向渐变模拟光照
     * - 上方金色光晕：暗示"吉兆"
     * - 下方红色光晕：暗示"传统"（极淡，不影响阅读）
     */
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(200,164,78,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 100%, rgba(139,26,26,0.05) 0%, transparent 40%);
  }

  /* ===== 页头 ===== */
  .header {
    text-align: center;
    padding: 12px 0 8px;
  }
  .header .icon { font-size: 44px; margin-bottom: 4px; }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    color: var(--red2);
    letter-spacing: 3px;
    /*
     * 渐变文字技法：
     * background-clip: text 将背景裁剪到文字形状，
     * text-fill-color: transparent 让渐变透过文字显示
     * 需要 -webkit- 前缀兼容更多浏览器
     */
    background: linear-gradient(180deg, var(--red) 0%, var(--red2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .subtitle {
    font-size: 13px;
    color: var(--text2);
    letter-spacing: 2px;
    margin-top: 2px;
  }

  /* ===== 主容器 ===== */
  .app-container {
    width: 100%;
    max-width: 420px; /* 限制最大宽度，大屏上保持居中卡片效果 */
    display: flex;
    flex-direction: column;
    gap: 16px; /* 卡片之间的间距 */
  }

  /* ===== 通用卡片样式 ===== */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 18px;
    /* 双层阴影：一层柔和的扩散阴影 + 一层1px的边框阴影模拟描边 */
    box-shadow: 0 2px 12px var(--shadow), 0 0 0 1px var(--border);
    border: 1px solid var(--border);
  }

  /* ===== 自动时间显示区 ===== */
  .auto-time {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 12px;
    background: var(--card2);
    border-radius: 12px;
    font-size: 14px;
    color: var(--text2);
  }
  .auto-time .label { opacity: 0.7; }
  .auto-time .value {
    font-weight: 600;
    color: var(--red);
    font-size: 16px;
  }
  /* 绿色呼吸灯：表示"系统在线"，类似古时香火不灭 */
  .auto-time .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  /* 脉冲动画：模拟呼吸效果 */
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* ===== 手动输入区 ===== */
  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-top: 10px;
  }
  .input-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .input-group label {
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 1px;
    text-align: center;
  }
  /* 下拉选择框统一样式 */
  .input-group select {
    appearance: none;           /* 移除浏览器默认下拉箭头 */
    -webkit-appearance: none;
    width: 100%;
    padding: 10px 8px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card2);
    color: var(--text);
    font-size: 15px;
    text-align: center;
    font-family: inherit;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group select:focus {
    border-color: var(--gold); /* 聚焦时金色高亮 */
  }
  /* 数字输入框样式 */
  .input-group input {
    width: 100%;
    padding: 10px 8px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card2);
    color: var(--text);
    font-size: 15px;
    text-align: center;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus {
    border-color: var(--gold);
  }
  .input-group input::placeholder {
    color: var(--text2);
    opacity: 0.4;
    font-size: 12px;
  }

  /* ===== 按钮 ===== */
  .btn {
    display: block;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 2px;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }
  /* 按下缩放反馈：给用户物理按压感 */
  .btn:active {
    transform: scale(0.96);
  }
  /* 主按钮：朱砂红渐变背景，带红色辉光 */
  .btn-primary {
    background: linear-gradient(135deg, var(--red) 0%, var(--red2) 100%);
    color: #fff;
    box-shadow: 0 4px 16px rgba(178,34,34,0.35);
  }
  .btn-primary:active {
    box-shadow: 0 2px 8px rgba(178,34,34,0.25); /* 按下时阴影减淡 */
  }
  /* 描边按钮：透明背景，红色边框 */
  .btn-outline {
    background: transparent;
    color: var(--red);
    border: 1.5px solid var(--red);
    font-size: 14px;
    padding: 10px;
    letter-spacing: 1px;
  }

  /*
   * ===== 六宫格罗盘布局 =====
   * 布局原理：
   *   2行×3列 Grid 网格，中央叠加太极图
   *   gap 透出背景色形成罗盘格线
   *
   *   罗盘排列：
   *     ⑥ 空亡      ① 大安      ② 留连
   *     ⑤ 小吉      ④ 赤口      ③ 速喜
   */
  .circle-container {
    position: relative;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 2px;
    width: 100%;
    aspect-ratio: 3 / 2;
    max-width: 400px;
    margin: 0 auto;
    background: var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  /* 中央太极图 */
  .circle-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%); /* 居中定位 */
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--yin);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;               /* 确保太极图在最上层 */
    transition: all 0.4s;
  }
  .circle-center .yin-yang {
    font-size: 22px;
    animation: spin-slow 12s linear infinite; /* 太极图缓慢旋转 */
  }
  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* 掌诀卡片通用样式 */
  .palace {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1); /* 缓出缓入动画 */
    cursor: default;
    border: 2px solid transparent;
    background: var(--card2);
    box-shadow: 0 1px 4px var(--shadow);
  }
  .palace .p-name {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text);
  }
  .palace .p-fortune {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text2);
  }
  /* 数字序号（壹贰叁肆伍陆） */
  .palace .p-index {
    position: absolute;
    top: 6px;
    right: 10px;
    font-size: 10px;
    color: var(--text2);
    opacity: 0.45;
  }
  /* 推算过程中当前停留位置（金色高亮） */
  .palace.active {
    border-color: var(--gold);
    background: var(--gold-light);
    box-shadow: 0 0 20px rgba(200,164,78,0.4), 0 4px 16px var(--shadow);
    transform: scale(1.06);
    z-index: 5;
    animation: glow-pulse 0.6s ease-in-out;
  }
  /* 最终结果位置（红色高亮 + 呼吸光晕） */
  .palace.result {
    border-color: var(--red);
    background: #fff;
    box-shadow: 0 0 28px rgba(178,34,34,0.5), 0 4px 20px var(--shadow);
    transform: scale(1.1);
    z-index: 6;                /* 比active更高，确保结果最显眼 */
    animation: result-glow 0.8s ease-in-out infinite alternate;
  }
  @keyframes glow-pulse {
    0% { box-shadow: 0 0 0 rgba(200,164,78,0); }
    50% { box-shadow: 0 0 28px rgba(200,164,78,0.5), 0 4px 16px var(--shadow); }
    100% { box-shadow: 0 0 20px rgba(200,164,78,0.4), 0 4px 16px var(--shadow); }
  }
  @keyframes result-glow {
    from { box-shadow: 0 0 20px rgba(178,34,34,0.4), 0 4px 16px var(--shadow); }
    to { box-shadow: 0 0 36px rgba(178,34,34,0.7), 0 6px 24px var(--shadow); }
  }
  /* 推算过程中途经的位置（浅金色标记） */
  .palace.counting {
    border-color: var(--gold);
    background: #fff8e8;
    box-shadow: 0 0 16px rgba(200,164,78,0.35);
    transform: scale(1.03);
  }
  /* 已走过的路径轨迹（比 counting 更淡，显示流转方向） */
  .palace.trail {
    border-color: var(--gold);
    background: #fef9e7;
    box-shadow: 0 0 4px rgba(200,164,78,0.1);
    transform: scale(1.01);
  }
  @media (prefers-color-scheme: dark) {
    .palace.trail {
      background: #2a2010;
    }
  }

  /*
   * 六宫格罗盘排列（Grid order 控制）
   *
   * 罗盘顺时针排列：
   *   ⑥空亡(左上)  ①大安(上中)  ②留连(右上)
   *   ⑤小吉(左下)  ④赤口(下中)  ③速喜(右下)
   *
   * 使用 CSS order 属性重新排列 DOM 顺序（HTML中为1-6）
   * 使其符合罗盘布局
   */
  .palace-1 { order: 1; }  /* 大安 - 上中 */
  .palace-2 { order: 2; }  /* 留连 - 右上 */
  .palace-3 { order: 5; }  /* 速喜 - 右下 */
  .palace-4 { order: 4; }  /* 赤口 - 下中 */
  .palace-5 { order: 3; }  /* 小吉 - 左下 */
  .palace-6 { order: 0; }  /* 空亡 - 左上 */

  /* ===== 推算步骤指示器 ===== */
  .steps-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    align-items: center;
    padding: 4px 0;
  }
  /* 步骤圆点：显示"月→日→时"或"数1→数2→数3" */
  .step-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--yin);
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--text2);
    transition: all 0.3s;
  }
  .step-dot.done {
    background: var(--gold-light);   /* 步骤完成：浅金色 */
    border-color: var(--gold);
    color: var(--gold2);
  }
  .step-dot.current {
    background: var(--red);          /* 当前步骤：红色脉冲 */
    border-color: var(--red2);
    color: #fff;
    animation: pulse-dot 0.8s ease-in-out infinite;
  }
  .step-arrow {
    color: var(--border);
    font-size: 12px;
  }

  /* ===== 结果卡片 ===== */
  .result-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 2px solid var(--gold);   /* 金色描边表示结果 */
    box-shadow: 0 4px 24px var(--shadow), 0 0 0 1px var(--border);
    overflow: hidden;
    /* 滑入动画：从下方弹入，使用回弹缓动函数 */
    animation: slide-up 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes slide-up {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }
  /* 结果头部：深红渐变背景，白色文字 */
  .result-header {
    background: linear-gradient(135deg, var(--red2) 0%, #5a1010 100%);
    color: #fff;
    padding: 18px 20px;
    text-align: center;
  }
  .result-header .r-name {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 4px;
  }
  .result-header .r-fortune {
    font-size: 14px;
    letter-spacing: 2px;
    margin-top: 4px;
    opacity: 0.85;
    padding: 2px 16px;
    border-radius: 20px;
    display: inline-block;
  }
  /* 吉兆标签：白色半透明底 */
  .fortune-good { background: rgba(255,255,255,0.15); }
  /* 凶兆标签：黑色半透明底 */
  .fortune-bad { background: rgba(0,0,0,0.25); }
  .result-body {
    padding: 16px 18px;
  }
  /* 基础信息三列网格 */
  .result-body .r-section {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr; /* 三列等宽 */
    gap: 8px;
    margin-bottom: 14px;
  }
  .r-item {
    background: var(--card2);
    border-radius: 10px;
    padding: 8px 6px;
    text-align: center;
  }
  .r-item .item-label {
    font-size: 10px;
    color: var(--text2);
    letter-spacing: 1px;
  }
  .r-item .item-val {
    font-size: 13px;
    font-weight: 600;
    margin-top: 2px;
    color: var(--text);
  }
  /* 详细断辞列表 */
  .detail-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .detail-item {
    background: var(--card2);
    border-radius: 10px;
    padding: 10px 14px;
    border-left: 3px solid var(--gold); /* 左侧金色竖线，类似古书批注 */
  }
  .detail-item .d-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--red);
    margin-bottom: 2px;
  }
  .detail-item .d-text {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.5;
  }

  /* 传统口诀展示框 */
  .koujue-box {
    background: linear-gradient(135deg, #fef9e7 0%, #fdf3d0 100%); /* 淡黄色宣纸纹理 */
    border: 1px solid var(--gold);
    border-radius: 12px;
    padding: 14px 16px;
    margin: 12px 0;
    text-align: center;
  }
  .koujue-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--gold2);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .koujue-text {
    font-size: 14px;
    line-height: 1.9;
    color: #5c3a18;
    letter-spacing: 1px;
    font-style: italic; /* 斜体增加古韵 */
  }
  @media (prefers-color-scheme: dark) {
    .koujue-box {
      background: linear-gradient(135deg, #2a2010 0%, #252010 100%);
      border-color: var(--gold2);
    }
    .koujue-text { color: #d4c090; }
  }

  /* 分类断辞标题 */
  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--red);
    letter-spacing: 2px;
    padding: 10px 0 6px;
    text-align: center;
  }

  /* 吉凶指数进度条 */
  .fortune-meter {
    margin-top: 14px;
    padding: 12px;
    background: var(--card2);
    border-radius: 12px;
    text-align: center;
  }
  .meter-label {
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .meter-bar {
    height: 8px;
    background: #e0d5c0;
    border-radius: 4px;
    overflow: hidden;
    margin: 0 auto;
    max-width: 240px;
  }
  @media (prefers-color-scheme: dark) {

// ==================== 农历转换引擎 ====================
/*
 * 从 LUNAR_YEAR_DATA 中提取指定年份的编码值
 * @param {number} year - 公历年份 (1900-2100)
 * @returns {number} 该年的农历编码数据
 */
function getLunarYearInfo(year) {
  return LUNAR_YEAR_DATA[year - 1900] || 0;
}

/*
 * 获取指定年份的闰月月份
 * 编码的 bits 0-3 存储闰月信息
 * @param {number} year - 公历年份
 * @returns {number} 闰月月份 (0=无闰月, 1-12=闰几月)
 */
function getLeapMonth(year) {
  return getLunarYearInfo(year) & 0xf;
}

/*
 * 按月份序号获取该月天数
 * 编码的 bit (4 + monthIndex - 1) 存储该月大小：1=30天, 0=29天
 * @param {number} year - 公历年份
 * @param {number} monthIndex - 月份序号 (1-12 非闰年, 1-13 闰年)
 * @returns {number} 该月天数 (29 或 30)
 */
function getMonthDaysByIndex(year, monthIndex) {
  const info = getLunarYearInfo(year);
  return (info & (1 << (4 + monthIndex - 1))) ? 30 : 29;
}

/*
 * 判断指定月份序号是否为闰月
 * 闰月紧跟在同名月份之后（如闰四月在四月之后）
 * @param {number} year - 公历年份
 * @param {number} monthIndex - 月份序号
 * @returns {boolean} 是否为闰月
 */
function isLeapAtIndex(year, monthIndex) {
  const leap = getLeapMonth(year);
  return leap > 0 && monthIndex === leap + 1;
}

/*
 * 计算农历年总天数
 * 闰年有13个月，非闰年12个月，累加每月天数
 * @param {number} year - 农历年份
 * @returns {number} 该年总天数
 */
function lunarYearDays(year) {
  const leap = getLeapMonth(year);
  const monthCount = leap > 0 ? 13 : 12;
  let sum = 0;
  for (let i = 1; i <= monthCount; i++) {
    sum += getMonthDaysByIndex(year, i);
  }
  return sum;
}

/*
 * ==================== 公历转农历 ====================
 *
 * 算法流程：
 * 1. 计算从基准日（农历1900年正月初一 = 公历1900-01-31）到目标日期的偏移天数
 * 2. 从1900年起逐年减去每年天数，直到剩余天数不足一年 → 确定农历年
 * 3. 在确定的年份内逐月减去每月天数，直到剩余天数不足一月 → 确定农历月、日
 * 4. 判断该月是否为闰月，并转换为用户友好的显示月份
 *
 * @param {Date} date - 公历日期对象
 * @returns {{ year: number, month: number, day: number, isLeap: boolean }} 农历日期
 */
function solarToLunar(date) {
  // 基准日：农历1900年正月初一 = 公历1900年1月31日
  const baseDate = new Date(1900, 0, 31);
  // 计算两个日期之间的天数差
  let offset = Math.floor((date - baseDate) / 86400000);
  if (offset < 0) offset = 0; // 1900年之前的日期截断到1900年

  // 第一步：确定农历年 - 逐年减天数
  let lunarYear;
  for (lunarYear = 1900; lunarYear <= 2100; lunarYear++) {
    const yDays = lunarYearDays(lunarYear);
    if (offset < yDays) break;   // 剩余天数不足一年，当前年即为农历年
    offset -= yDays;
  }
  if (lunarYear > 2100) lunarYear = 2100; // 超出范围的安全回退

  // 第二步：确定农历月日 - 逐月减天数
  const leap = getLeapMonth(lunarYear);
  const monthCount = leap > 0 ? 13 : 12;

  for (let mi = 1; mi <= monthCount; mi++) {
    const mDays = getMonthDaysByIndex(lunarYear, mi);
    if (offset < mDays) {
      // 剩余天数不足一月 → 找到目标月份
      const isLeap = isLeapAtIndex(lunarYear, mi);
      /*
       * 转换为用户友好的显示月份：
       * - 如果当前是闰月：显示为"闰X月"，X = 闰月编号
       * - 如果当前月在闰月之后（且非闰月）：displayMonth = mi - 1（因为闰月多占了一个序号）
       * - 否则：displayMonth = mi
       */
      let displayMonth;
      if (isLeap) {
        displayMonth = leap;          // 闰X月，X = 被闰的月份
      } else if (leap > 0 && mi > leap + 1) {
        displayMonth = mi - 1;        // 闰月后的月份序号要减1
      } else {
        displayMonth = mi;
      }
      return {
        year: lunarYear,
        month: displayMonth,
        day: offset + 1,             // 日期从1开始
        isLeap: isLeap
      };
    }
    offset -= mDays;
  }

  // 兜底：理论上不会到达，但保证函数总是有返回值
  return { year: lunarYear, month: 12, day: 30, isLeap: false };
}

/*
 * 获取当前时辰序号 (1-12)
 * 根据当前小时数判断属于哪个时辰
 * 子时起点为23:00（与通常认知一致）
 * @param {Date} [date=new Date()] - 日期对象（可选，默认当前时间）
 * @returns {number} 时辰序号 1-12
 */
function getCurrentShiChen(date = new Date()) {
  const h = date.getHours();
  if (h >= 23 || h < 1) return 1;   // 子时 (23:00-01:00)
  if (h >= 1 && h < 3) return 2;    // 丑时 (01:00-03:00)
  if (h >= 3 && h < 5) return 3;    // 寅时 (03:00-05:00)
  if (h >= 5 && h < 7) return 4;    // 卯时 (05:00-07:00)
  if (h >= 7 && h < 9) return 5;    // 辰时 (07:00-09:00)
  if (h >= 9 && h < 11) return 6;   // 巳时 (09:00-11:00)
  if (h >= 11 && h < 13) return 7;  // 午时 (11:00-13:00)
  if (h >= 13 && h < 15) return 8;  // 未时 (13:00-15:00)
  if (h >= 15 && h < 17) return 9;  // 申时 (15:00-17:00)
  if (h >= 17 && h < 19) return 10; // 酉时 (17:00-19:00)
  if (h >= 19 && h < 21) return 11; // 戌时 (19:00-21:00)
  return 12;                         // 亥时 (21:00-23:00)
}

/*
 * 获取时辰的名称和时间范围
 * @param {number} idx - 时辰序号 (1-12)
 * @returns {string} 如 "子时 23:00-01:00"
 */
function getShiChenName(idx) {
  return SHI_CHEN[idx - 1].name + ' ' + SHI_CHEN[idx - 1].range;
}

/*
 * 获取干支纪年字符串
 * 公元4年为甲子年，以此为基准推算
 * @param {number} year - 公历年份
 * @returns {string} 如 "丙午年 [马]"
 */
function getStemBranch(year) {
  const s = STEMS[(year - 4) % 10];      // 天干
  const b = BRANCHES[(year - 4) % 12];    // 地支
  return s + b + '年 [' + ZODIAC[(year - 4) % 12] + ']';
}

/*
 * ==================== 小六壬推算引擎 ====================
 *
 * 核心算法 — 三次顺数：
 *   从大安（位置1）起正月，顺时针数月数次 → 得月落位 (pos1)
 *   从月落位起初一，顺时针数日数次 → 得日落位 (pos2)
 *   从日落位起子时，顺时针数时辰数次 → 得最终落位 (pos3)
 *
 * 顺时针顺序（六掌诀排列）：
 *   大安(1) → 留连(2) → 速喜(3) → 赤口(4) → 小吉(5) → 空亡(6) → 大安(1)...
 *
 * 数学原理：在模6的整数环上做加法
 *   next_pos = ((current_pos - 1 + count - 1) % 6) + 1
 *   其中 -1 和 +1 是为了在 1-6 之间做模运算（因为位置从1开始不是从0开始）
 *
 * @param {number} month - 农历月份 (1-12)
 * @param {number} day   - 农历日期 (1-30)
 * @param {number} hour  - 时辰序号 (1-12)
 * @returns {{ monthPos, dayPos, resultPos, result, steps }} 推算结果
 */
function calculate(month, day, hour) {
  // 第一步「月上起日」：大安(1)起正月，顺时针数到目标月份
  let pos1 = ((month - 1) % 6) + 1;

  // 第二步「日上起时」：从月落位起初一，顺时针数到目标日期
  let pos2 = ((pos1 - 1 + day - 1) % 6) + 1;

  // 第三步「时上查诀」：从日落位起子时，顺时针数到目标时辰 → 得最终结果
  let pos3 = ((pos2 - 1 + hour - 1) % 6) + 1;

  return {
    monthPos: pos1,       // 月份推算落点
    dayPos: pos2,         // 日期推算落点
    resultPos: pos3,      // 最终结果落点
    result: PALACES[pos3],// 落点对应的掌诀数据
    steps: [              // 三个推算步骤的详细信息（用于动画展示）
      { label: '月上起日', from: 1, count: month, result: pos1 },
      { label: '日上起时', from: pos1, count: day, result: pos2 },
      { label: '时上查诀', from: pos2, count: hour, result: pos3 }
    ]
  };
}

/*
 * 填充三个下拉选择框：农历月、农历日、时辰
 */
function populateSelects() {
  const monthSel = document.getElementById('lunarMonth');
  const daySel = document.getElementById('lunarDay');
  const hourSel = document.getElementById('lunarHour');

  // 农历月：正月、二月...冬月、腊月
  for (let i = 1; i <= 12; i++) {
    monthSel.appendChild(new Option((i === 1 ? '正' : i === 11 ? '冬' : i === 12 ? '腊' : numToChinese(i)) + '月', i));
  }
  // 农历日：初一 ~ 三十
  for (let i = 1; i <= 30; i++) {
    daySel.appendChild(new Option(numToChinese(i), i));
  }
  // 十二时辰
  SHI_CHEN.forEach((sc, idx) => {
    hourSel.appendChild(new Option(sc.name + ' (' + sc.range + ')', sc.hour));
  });
}

/*
 * 阿拉伯数字转中文数字（1-30）
 * 使用查表法，比逐个转换更简洁
 * @param {number} n - 数字 (1-30)
 * @returns {string} 中文表示（如一、十一、廿一）
 */
function numToChinese(n) {
  const chars = ['','一','二','三','四','五','六','七','八','九','十',
    '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
    '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
  return chars[n] || String(n);
}

/*
 * 月份数字转中文显示名
 * @param {number} m - 月份 (1-12)
 * @param {boolean} isLeap - 是否为闰月
 * @returns {string} 如 "正月"、"闰四月"、"腊月"
 */
function monthToChinese(m, isLeap) {
  const prefix = isLeap ? '闰' : '';
  if (m === 1) return prefix + '正月';
  if (m === 11) return prefix + '冬月';
  if (m === 12) return prefix + '腊月';
  return prefix + numToChinese(m) + '月';
}

/*
 * 更新自动时间显示区
 * 将当前公历转换为农历，同步更新下拉选择框
 */
function updateAutoTime() {
  const now = new Date();
  const lunar = solarToLunar(now);
  currentLunar = lunar;                      // 缓存当前农历日期
  const shiChen = getCurrentShiChen(now);

  // 显示干支纪年 + 农历月日
  document.getElementById('autoDate').textContent =
    getStemBranch(lunar.year) + ' · ' + monthToChinese(lunar.month, lunar.isLeap) + numToChinese(lunar.day);
  // 显示当前时辰名称
  document.getElementById('autoTime').textContent =
    SHI_CHEN[shiChen - 1].name;

  // 将当前时间同步到手动选择框（方便用户微调）
  document.getElementById('lunarMonth').value = lunar.month;
  document.getElementById('lunarDay').value = Math.min(lunar.day, 30);
  document.getElementById('lunarHour').value = shiChen;
}

/*
 * 注册所有UI事件监听
 */
function setupEvents() {
  // 手动推算按钮：使用下拉框中选择的月日时
  document.getElementById('btnCalc').addEventListener('click', () => {
    const m = parseInt(document.getElementById('lunarMonth').value);
    const d = parseInt(document.getElementById('lunarDay').value);
    const h = parseInt(document.getElementById('lunarHour').value);
    doCalculation(m, d, h);
  });

  // 使用当前时间按钮：自动获取当前农历月日时
  document.getElementById('btnAuto').addEventListener('click', () => {
    updateAutoTime();
    const m = parseInt(document.getElementById('lunarMonth').value);
    const d = parseInt(document.getElementById('lunarDay').value);
    const h = parseInt(document.getElementById('lunarHour').value);
    doCalculation(m, d, h);
  });

  // 三数报数法按钮：取三个数字（空值随机填充）起卦
  document.getElementById('btnNumber').addEventListener('click', () => {
    let n1 = parseInt(document.getElementById('num1').value);
    let n2 = parseInt(document.getElementById('num2').value);
    let n3 = parseInt(document.getElementById('num3').value);

    // 空值或无效值自动随机填充（1-99）
    if (!n1 || n1 < 1) n1 = Math.floor(Math.random() * 99) + 1;
    if (!n2 || n2 < 1) n2 = Math.floor(Math.random() * 99) + 1;
    if (!n3 || n3 < 1) n3 = Math.floor(Math.random() * 99) + 1;

    // 回填到输入框，让用户看到实际使用的数字
    document.getElementById('num1').value = n1;
    document.getElementById('num2').value = n2;
    document.getElementById('num3').value = n3;

    doCalculation(n1, n2, n3, true); // 第四个参数标记为报数法
  });

  // 数字输入框支持回车键触发推算
  ['num1','num2','num3'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btnNumber').click();
    });
  });

  // 点击农历日期区域也可刷新为当前时间
  document.getElementById('autoDate').addEventListener('click', updateAutoTime);
}

/*
 * 执行推算 + 播放动画
 *
 * 动画流程：
 * 1. 重置所有状态（宫殿高亮、步骤指示器、结果卡片）
 * 2. 第一步动画：从大安起，顺时针数月
 * 3. 第二步动画：从月落位起，顺时针数日
 * 4. 第三步动画：从日落位起，顺时针数时
 * 5. 高亮最终结果 → 振动反馈 → 显示结果卡片
 *
 * @param {number} month - 第一数
 * @param {number} day - 第二数
 * @param {number} hour - 第三数
 * @param {boolean} [isNumberMethod=false] - 是否为报数法（影响步骤标签文字）
 */
async function doCalculation(month, day, hour, isNumberMethod = false) {
  if (isAnimating) return; // 动画锁：防止快速连击导致动画错乱
  isAnimating = true;

  const result = calculate(month, day, hour);

  // 清除所有宫殿的高亮状态（含轨迹）
  document.querySelectorAll('.palace').forEach(p => {
    p.classList.remove('active', 'result', 'counting', 'trail');
  });

  // 重置步骤指示器
  document.querySelectorAll('.step-dot').forEach(d => {
    d.classList.remove('done', 'current');
  });

  // 隐藏旧的结果卡片
  const resultCard = document.getElementById('resultCard');
  resultCard.classList.add('hidden');

  // 根据推算模式切换步骤标签文字
  if (isNumberMethod) {
    document.getElementById('step1').textContent = '数1';
    document.getElementById('step2').textContent = '数2';
    document.getElementById('step3').textContent = '数3';
  } else {
    document.getElementById('step1').textContent = '月';
    document.getElementById('step2').textContent = '日';
    document.getElementById('step3').textContent = '时';
  }

  // === 动画序列：三步依次播放 ===

  // 第一步：月上起日
  document.getElementById('step1').classList.add('current');
  await animateCounting(1, month, result.steps[0].result);
  document.getElementById('step1').classList.remove('current');
  document.getElementById('step1').classList.add('done');

  await sleep(300); // 步骤间停顿，让用户感知进度

  // 第二步：日上起时
  document.getElementById('step2').classList.add('current');
  await animateCounting(result.steps[1].from, day, result.steps[1].result);
  document.getElementById('step2').classList.remove('current');
  document.getElementById('step2').classList.add('done');

  await sleep(300);

  // 第三步：时上查诀
  document.getElementById('step3').classList.add('current');
  await animateCounting(result.steps[2].from, hour, result.steps[2].result);
  document.getElementById('step3').classList.remove('current');
  document.getElementById('step3').classList.add('done');

  // 最终结果高亮
  await sleep(200);
  highlightResult(result.resultPos);

  // 振动反馈：模拟掐指一算的物理触感
  if (navigator.vibrate) {
    navigator.vibrate([50, 100, 50]); // 短振-停-短振
  }

  // 生成并显示结果卡片
  showResult(result, isNumberMethod, month, day, hour);

  isAnimating = false; // 释放动画锁
}

/*
 * 推算动画：在六宫格上顺时针逐格跳动
 *
 * 流转效果策略：
 *   - 第1个数高亮起始位置（如"正月"就停在大安）
 *   - 之后每数一个数顺时针移一格
 *   - 已走过的宫格保留淡金色轨迹（.trail），显示流转方向
 *   - 当前停留的宫格用亮金色高亮（.counting）
 *   - 最后一步用 active 高亮，轨迹清空
 *   - 越往后节奏越快，营造"逼近结果"的紧张感
 *
 * @param {number} fromIdx - 起始位置 (1-6)
 * @param {number} count - 总共要数的次数（月数/日数/时数）
 * @param {number} resultIdx - 最终落点位置 (1-6)
 * @returns {Promise} 动画完成后 resolve
 */
function animateCounting(fromIdx, count, resultIdx) {
  return new Promise(resolve => {
    let current = fromIdx;     // 当前指针位置
    let n = 1;                 // 当前数到第几下（1-based）
    const visited = [];        // 已走过的宫格索引（用于绘制轨迹）

    function tick() {
      if (n > count) {
        // 动画完成：清除所有中间状态，高亮最终落点
        document.querySelectorAll('.palace').forEach(p => {
          p.classList.remove('counting', 'trail');
        });
        highlightPalace(resultIdx, 'active');
        resolve();
        return;
      }

      // 清除当前轮次的 counting 状态
      document.querySelectorAll('.palace.counting').forEach(p => p.classList.remove('counting'));

      // 为已走过的宫格设置轨迹
      visited.forEach(idx => {
        getPalace(idx).classList.add('trail');
      });

      // 高亮当前宫格（始终用 counting，最后结果由收尾逻辑统一处理）
      getPalace(current).classList.add('counting');

      // 记录当前宫格到轨迹
      visited.push(current);

      // 还没数完：顺时针移到下一格
      if (n < count) {
        current = (current % 6) + 1;  // 1→2→3→4→5→6→1...
      }

      // 动态延迟：先快后慢再快（紧张感节奏）
      const progress = (n - 1) / count;
      const delay = n === count ? 400 : 100 + Math.sin(progress * Math.PI) * 180;
      n++;
      setTimeout(tick, delay);
    }

    // 延迟200ms开始动画（给用户一个"即将开始"的心理准备）
    setTimeout(tick, 200);
  });
}

/* 获取指定编号的宫格 DOM 元素 */
function getPalace(idx) {
  return document.querySelector('.palace-' + idx);
}

/*
 * 高亮指定位置的宫殿
 * 处理逻辑：
 *   - 清除同一类型的所有其他高亮（防止多个宫殿同时高亮）
 *   - 'active' 优先级高于 'counting'，设置 active 时清除所有 counting
 *   - 'counting' 时不清除已有的 'active'（避免第一步的active被后续counting覆盖）
 * @param {number} idx - 宫殿位置 (1-6)
 * @param {string} className - CSS类名 ('active' | 'counting' | 'result')
 */
function highlightPalace(idx, className) {
  // 清除当前类型的所有高亮
  document.querySelectorAll('.palace.' + className).forEach(p => {
    // 特殊处理：如果正在清除 counting 但该宫殿同时有 active，不要清除 counting
    // 这样避免重复清除/重设导致闪烁
    if (!(className === 'counting' && p.classList.contains('active'))) {
      p.classList.remove(className);
    }
  });
  // 设置 active 时清除所有 counting 和 trail（active优先级更高）
  if (className === 'active') {
    document.querySelectorAll('.palace.counting, .palace.trail').forEach(p => {
      p.classList.remove('counting', 'trail');
    });
  }

  const palace = document.querySelector('.palace-' + idx);
  if (palace) {
    palace.classList.add(className);
  }
}

/*
 * 高亮最终结果位置（红色呼吸光晕）
 * 清除所有中间状态，仅保留最终结果高亮
 * @param {number} idx - 结果宫殿位置 (1-6)
 */
function highlightResult(idx) {
  document.querySelectorAll('.palace').forEach(p => {
    p.classList.remove('active', 'counting', 'result', 'trail');
  });
  const palace = document.querySelector('.palace-' + idx);
  if (palace) {
    palace.classList.add('result');
  }
}

/*
 * 生成并显示结果卡片
 *
 * 卡片结构：
 *   头部（红色渐变）→ 基础信息三列网格 → 掌诀总断 → 传统口诀 → 十类详解 → 吉凶指数
 *
 * @param {object} result - calculate() 返回的结果对象
 * @param {boolean} isNumberMethod - 是否报数法
 * @param {number} num1 - 第一数
 * @param {number} num2 - 第二数
 * @param {number} num3 - 第三数
 */
function showResult(result, isNumberMethod, num1, num2, num3) {
  const card = document.getElementById('resultCard');
  const p = result.result;
  const isGood = p.fortune.includes('吉');
  const fortuneClass = isGood ? 'fortune-good' : 'fortune-bad';

  // 构建输入描述文字
  let inputDesc = '';
  if (isNumberMethod) {
    inputDesc = `报数法：${num1} → ${num2} → ${num3}`;
  } else {
    const m = parseInt(document.getElementById('lunarMonth').value);
    const d = parseInt(document.getElementById('lunarDay').value);
    const h = parseInt(document.getElementById('lunarHour').value);
    inputDesc = '农历' + monthToChinese(m, false) + numToChinese(d) + ' ' + SHI_CHEN[h-1].name;
  }

  // 动态生成HTML：使用模板字符串将掌诀数据填充到卡片的各个区域
  card.innerHTML = `
    <div class="result-header">
      <div class="r-name">${p.emoji} ${p.name}</div>
      <div class="r-fortune ${fortuneClass}">${p.fortune} · ${p.sixGod} · 属${p.element}</div>
      <div style="font-size:13px; opacity:0.7; margin-top:6px;">${inputDesc}</div>
    </div>

    <div class="result-body">
      <!-- 基础信息：五行、六神、方位、谋事主数、贵人方、冲犯方 六宫速查 -->
      <div class="r-section">
        <div class="r-item">
          <div class="item-label">五行</div>
          <div class="item-val">${p.element} (${p.elementColor})</div>
        </div>
        <div class="r-item">
          <div class="item-label">六神</div>
          <div class="item-val">${p.sixGod}</div>
        </div>
        <div class="r-item">
          <div class="item-label">方位</div>
          <div class="item-val">${p.direction}</div>
        </div>
        <div class="r-item">
          <div class="item-label">谋事主数</div>
          <div class="item-val">${p.numbers}</div>
        </div>
        <div class="r-item">
          <div class="item-label">贵人方</div>
          <div class="item-val">${p.nobleDirection}</div>
        </div>
        <div class="r-item">
          <div class="item-label">冲犯方</div>
          <div class="item-val">${p.conflictDirection}</div>
        </div>
      </div>

      <!-- 掌诀总断：现代白话概述 -->
      <div class="detail-item" style="border-left-color: ${isGood ? 'var(--green)' : 'var(--red)'};">
        <div class="d-label">📖 掌诀总断</div>
        <div class="d-text">${p.overview}</div>
      </div>

      <!-- 传统口诀：古文原文 -->
      <div class="koujue-box">
        <div class="koujue-title">📜 传统口诀</div>
        <div class="koujue-text">${p.koujue.replace(/\n/g, '<br>')}</div>
      </div>

      <!-- 十类分类断辞 -->
      <div class="section-title">🔍 各事项详解</div>
      <div class="detail-list">
        ${Object.entries(p.details).map(([key, val]) => `
          <div class="detail-item">
            <div class="d-label">${getCategoryIcon(key)} ${key}</div>
            <div class="d-text">${val}</div>
          </div>
        `).join('')}
      </div>

      <!-- 吉凶指数可视化：进度条 + 星级 -->
      <div class="fortune-meter">
        <div class="meter-label">吉凶指数</div>
        <div class="meter-bar">
          <div class="meter-fill ${isGood ? 'meter-good' : 'meter-bad'}" style="width:${(p.fortuneLevel/5)*100}%"></div>
        </div>
        <div class="meter-stars">${p.starRating} (${p.fortuneLevel}/5)</div>
      </div>
    </div>
  `;

  // 显示卡片并平滑滚动到可见区域
  card.classList.remove('hidden');
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

/*
 * 获取分类标题对应的图标
 * 为十类断辞提供视觉区分
 * @param {string} key - 分类标题
 * @returns {string} emoji图标
 */
function getCategoryIcon(key) {
  const icons = {
    '总体运程': '🔮', '事业工作': '💼', '财运求财': '💰',
    '感情婚姻': '💕', '健康疾病': '🏥', '失物寻物': '🔍',
    '行人出行': '🚶', '官非诉讼': '⚖️', '交易买卖': '🤝',
    '田宅家宅': '🏠'
  };
  return icons[key] || '📌';
}

/*
 * Promise 化的 setTimeout
 * 用于 async/await 流程中插入延迟
 * @param {number} ms - 延迟毫秒数
 * @returns {Promise} 延迟后 resolve
 */
function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

/*
 * ==================== PWA 安装逻辑 ====================
 * 利用浏览器 beforeinstallprompt 事件实现自定义安装提示
 */

let deferredPrompt = null; // 保存安装提示事件对象

/*
 * 监听 beforeinstallprompt 事件
 * 浏览器准备显示安装提示时触发
 * 我们阻止默认行为，改为自定义的延迟显示
 */
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();          // 阻止浏览器默认的安装提示
  deferredPrompt = e;          // 保存事件对象，供后续手动触发
  // 延迟3秒显示自定义安装横幅（避免页面刚加载就弹出，给用户浏览时间）
  setTimeout(() => {
    if (deferredPrompt) {
      document.getElementById('installBanner').classList.add('show');
    }
  }, 3000);
});

/*
 * 监听 appinstalled 事件
 * 用户完成安装后触发，隐藏安装横幅
 */
window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  document.getElementById('installBanner').classList.remove('show');
  console.log('小六壬 App 已安装到主屏幕');
});

/*
 * 用户点击安装横幅时调用
 * 触发浏览器原生安装对话框
 */
function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();   // 显示原生安装对话框
    deferredPrompt.userChoice.then(result => {
      if (result.outcome === 'accepted') {
        console.log('用户安装了 App');
      }
      deferredPrompt = null;
      document.getElementById('installBanner').classList.remove('show');
    });
  }
}

// 如果已经在独立模式（已安装为PWA），不需要显示安装横幅
if (window.matchMedia('(display-mode: standalone)').matches) {
  document.getElementById('installBanner').classList.remove('show');
}

/*
 * ==================== Service Worker 注册 ====================
 * 注册 PWA Service Worker 实现离线缓存
 * 注册失败不影响主应用功能（静默失败）
 */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {
      // 静默失败：即使 SW 注册失败，App 仍可在线使用
    });
  });
}

// ==================== 初始化：DOM加载完成后启动App ====================
document.addEventListener('DOMContentLoaded', init);
</script>
